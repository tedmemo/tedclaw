name: Check Upstream GoClaw Updates

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:      # Manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/nextlevelbuilder/goclaw.git

      - name: Fetch upstream
        run: git fetch upstream main --tags

      - name: Compare versions
        id: compare
        run: |
          LOCAL_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "none")
          UPSTREAM_TAG=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "none")
          BEHIND=$(git rev-list HEAD..upstream/main --count)

          echo "local_tag=$LOCAL_TAG" >> $GITHUB_OUTPUT
          echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if behind
        if: steps.compare.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Upstream GoClaw update: ${context.payload.repository.name} is ${${{ steps.compare.outputs.behind }}} commits behind`;
            const body = `## Upstream Update Available

            | | Version |
            |---|---|
            | **Our fork** | \`${{ steps.compare.outputs.local_tag }}\` |
            | **Upstream** | \`${{ steps.compare.outputs.upstream_tag }}\` |
            | **Commits behind** | ${{ steps.compare.outputs.behind }} |

            ### To update:
            \`\`\`bash
            cd tedclaw
            git fetch upstream
            git merge upstream/main --ff-only
            git push origin main
            docker compose pull && docker compose up -d
            \`\`\`

            [View upstream changes](https://github.com/nextlevelbuilder/goclaw/compare/${{ steps.compare.outputs.local_tag }}...${{ steps.compare.outputs.upstream_tag }})`;

            // Check if similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-update'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['upstream-update']
              });
            }
